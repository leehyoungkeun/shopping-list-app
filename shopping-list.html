<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4361ee;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #3a56d4; }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
      border-radius: 8px;
    }

    li:hover { background: #f8f9ff; }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .checkbox:hover { border-color: #4361ee; }

    li.checked .checkbox {
      background: #4361ee;
      border-color: #4361ee;
    }

    li.checked .checkbox::after {
      content: '✓';
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e63946;
      background: #fff0f0;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요" autofocus>
      <button onclick="addItem()">추가</button>
    </div>
    <div class="stats" id="stats"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty">리스트가 비어있습니다</div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');
    const statsEl = document.getElementById('stats');
    const input = document.getElementById('itemInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      listEl.innerHTML = '';
      emptyEl.style.display = items.length ? 'none' : 'block';

      const checked = items.filter(i => i.checked).length;
      statsEl.textContent = items.length
        ? `총 ${items.length}개 | 완료 ${checked}개`
        : '';

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <div class="checkbox" onclick="toggle(${idx})"></div>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${idx})">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    render();
  </script>
</body>
</html>
